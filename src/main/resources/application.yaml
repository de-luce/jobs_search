spring:
  application:
    name: get_jobs
  profiles:
    active: dev
  banner:
    charset: UTF-8
    location: classpath:banner.txt
  datasource:
    url: jdbc:sqlite:./db/getjobs.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5
      connection-test-query: SELECT 1
  sql:
    init:
      mode: never  # 数据库文件已存在，不需要自动初始化
  output:
    ansi:
      enabled: always

# 服务器配置
server:
  port: 8888  # 后端 API 固定端口

# 日志配置
logging:
  level:
    root: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){magenta} %clr(%-5level){highlight} %clr(%logger{36}){cyan} %clr(-){faint} %msg%n"
  file:
    name: target/logs/jobs_search.log
  logback:
    rolling policy:
      max-history: 30
      max-file-size: 10MB

mybatis-flex:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    print-banner: true
    key-config:
      key-type: Auto
